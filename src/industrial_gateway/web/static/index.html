<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Industrial Gateway</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app">
      <section id="loginView" class="login">
        <h1>Industrial Gateway</h1>
        <form id="loginForm">
          <label>Username <input id="username" autocomplete="username" value="admin"></label>
          <label>Password <input id="password" type="password" autocomplete="current-password"></label>
          <button type="submit">Log in</button>
          <p id="loginError" class="error"></p>
        </form>
      </section>

      <section id="consoleView" class="console hidden">
        <header class="topbar">
          <h1>Industrial Gateway <span id="appVersion" class="app-version"></span></h1>
          <div class="status"><span id="runtimeBadge">Stopped</span><button id="logoutButton">Log out</button></div>
        </header>
        <nav class="tabs">
          <button data-tab="devices" class="active">Devices</button>
          <button data-tab="plugins">Plugins</button>
          <button data-tab="runtime">Runtime</button>
        </nav>
        <section id="devicesTab" class="tab-panel">
          <div class="device-layout">
            <div class="device-editor-stack">
              <form id="deviceForm" class="panel"></form>
            </div>
            <div class="device-main-stack">
              <div class="device-top-grid">
                <section class="device-list-panel panel">
                  <div class="table-header">
                    <h2>Devices</h2>
                    <div class="table-actions">
                      <button id="newDevice">New device</button>
                      <button id="importDevices">Import CSV</button>
                      <button id="exportDevices">Export CSV</button>
                      <input id="deviceCsvFile" type="file" accept=".csv,text/csv" hidden>
                    </div>
                  </div>
                  <table class="fixed-table device-list-table">
                    <thead><tr><th>Group</th><th>Name</th><th>Driver</th><th>Endpoint</th><th>Mode</th></tr></thead>
                    <tbody id="deviceList"></tbody>
                  </table>
                </section>
                <form id="tagForm" class="panel"></form>
              </div>
              <section class="tags-panel panel">
              <div class="table-header">
                <h2>Tags</h2>
                <div class="page-controls">
                  <button id="tagViewMode" type="button" title="Toggle tag view">Sort by group</button>
                  <button id="prevTagGroupPage" type="button" title="Previous group">&lt;</button>
                  <span id="tagGroupPageLabel"></span>
                  <button id="nextTagGroupPage" type="button" title="Next group">&gt;</button>
                  <button id="prevTagListPage" type="button" title="Previous tag page">&lt;</button>
                  <span id="tagListPageLabel"></span>
                  <button id="nextTagListPage" type="button" title="Next tag page">&gt;</button>
                </div>
              </div>
              <table class="fixed-table"><thead><tr><th>Group</th><th>Name</th><th>Function</th><th>Type</th></tr></thead><tbody id="tagList"></tbody></table>
              </section>
            </div>
          </div>
        </section>
        <section id="pluginsTab" class="tab-panel hidden">
          <div class="plugin-layout">
            <div class="plugin-settings">
              <h2>Output Plugin</h2>
              <button id="importPlugins" type="button">Import CSV</button>
              <button id="exportPlugins" type="button">Export CSV</button>
              <input id="pluginCsvFile" type="file" accept=".csv,text/csv" hidden>
              <form id="pluginForm" class="panel"></form>
              <div id="pluginRouteEditor">
                <h2>Output Routes</h2>
                <form id="pluginRouteForm" class="panel"></form>
              </div>
            </div>
            <div id="pluginRouteListPanel" class="plugin-routes-panel panel">
              <h2>Route List</h2>
              <table class="fixed-table route-table"><thead><tr><th>Device</th><th>Group</th><th>MAC</th><th>Plugin</th><th>Enabled</th></tr></thead><tbody id="pluginRouteList"></tbody></table>
            </div>
          </div>
        </section>
        <section id="runtimeTab" class="tab-panel hidden">
          <div class="runtime-actions">
            <button id="startRuntime">Start</button>
            <button id="stopRuntime">Stop</button>
            <label>Health interval <input id="healthInterval" type="number" min="1" value="10"></label>
            <label class="checkbox-row"><input id="runtimeLogEnabled" type="checkbox" checked> Runtime logs</label>
          </div>
          <div class="runtime-grid">
            <section class="runtime-tags-panel">
              <div class="runtime-panel-header">
                <h2>Runtime Tags</h2>
                <div class="runtime-page-controls">
                  <button id="prevTagPage" title="Previous tag page">&lt;</button>
                  <span id="tagPageLabel"></span>
                  <button id="nextTagPage" title="Next tag page">&gt;</button>
                </div>
              </div>
              <table class="runtime-table">
                <thead><tr><th>Device</th><th>Group</th><th>Tag</th><th>Mode</th><th>Updated</th><th>Status</th></tr></thead>
                <tbody id="runtimeTags"></tbody>
              </table>
            </section>
            <section class="runtime-log-panel">
              <h2>Logs</h2>
              <div class="runtime-log-scroll"><pre id="logs"></pre></div>
            </section>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
